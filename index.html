<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÁUREA</title>
    <style>@import url('https://fonts.googleapis.com/css2?family=Anton&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap');</style>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <button class="menu-toggle" aria-label="Abrir menú">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <nav class="nav-desktop">
                <ul id="nav-list">
                    <li><a href="#hero">Próximamente</a></li>
                    <li><a href="#countdown">Galería</a></li>
                    <li><a href="#gallery">Entradas</a></li>
                    <li><a href="#ticket-location">Ubicación</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="snap-container">
        <section id="hero" class="snap-section">
            <div class="container">
                <h1>ÁUREA</h1>
                <p>vivir recuerdos <br>compartir momentos</p>
            </div>
        </section>
        <section id="countdown" class="snap-section">
            <div class="container">
                <h2>¿LISTO PARA CREAR TU PRÓXIMO RECUERDO?</h2>
                <div class="timer">
                    </div>
            </div>
        </section>
        <section id="gallery" class="snap-section">
            <div class="container">
                <h2>CONOCÉ LO QUE SE VIVE</h2>
                </div>
        </section>
        <section id="ticket-location" class="snap-section">           
            <div class="ticket-wrapper">
                <div class="ticket-content">
                    <h3>ES AHORA, ASEGURÁ TU LUGAR Y SÉ PARTE</h3>
                    <a href="#" class="btn">COMPRÁ TU ENTRADA</a>
                </div>
            </div>

            <div class="location-content">
                <div class="info">
                    <h3>ACÁ SUCEDE</h3>
                    <p>Juan B. Justo 62, Bernal</p>
                </div>
                <div class="map">
                    </div>
            </div>           
        </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
