<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÁUREA</title>
    <style>@import url('https://fonts.googleapis.com/css2?family=Anton&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap');</style>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <button class="menu-toggle" aria-label="Abrir menú">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <nav class="nav-desktop">
                <ul id="nav-list">
                    <li><a href="#countdown">Próximamente</a></li>
                    <li><a href="#gallery">Galería</a></li>
                    <li><a href="#ticket-location">Entradas</a></li>
                    <li><a href="#ticket-location">Ubicación</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="snap-container">
        <section id="hero" class="snap-section">
            <div class="container">
                <h1>ÁUREA</h1>
                <p>vivir recuerdos <br>compartir momentos</p>
            </div>
        </section>
        <section id="countdown" class="snap-section">
            <div class="countdown-wrapper">
                <div class="countdown-content">
                    <h2>¿LISTO PARA CREAR <br>TU PRÓXIMO <span class="accent-color">RECUERDO</span>?</h2>
                    
                    <div class="timer" id="timer">
                        <div class="time-block">
                            <span class="number">00</span>
                            <span class="label">DÍAS</span>
                        </div>
                        <div class="time-block">
                            <span class="number">00</span>
                            <span class="label">HORAS</span>
                        </div>
                        <div class="time-block">
                            <span class="number">00</span>
                            <span class="label">MINUTOS</span>
                        </div>
                        <div class="time-block">
                            <span class="number">00</span>
                            <span class="label">SEGUNDOS</span>
                        </div>
                    </div>
                </div>
                <div class="countdown-image">
                    <img src="assets/img/img-contador.webp" alt="Imagen de cuenta regresiva">
                </div>
            </div>
        </section>
        <section id="gallery" class="snap-section">
            <div class="container">
                <h2>CONOCÉ LO QUE SE VIVE</h2>
                </div>
        </section>
        <section id="ticket-location" class="snap-section">           
            <div class="ticket-wrapper">
                <div class="ticket-content">
                    <h3>ES AHORA, ASEGURÁ TU LUGAR Y SÉ PARTE</h3>
                    <a href="#" class="btn">COMPRÁ TU ENTRADA</a>
                </div>
            </div>

            <div class="location-content">
                <div class="info">
                    <h3>ACÁ SUCEDE</h3>
                    <p>Juan B. Justo 62, Bernal</p>
                </div>
                <div class="map">
                    </div>
            </div>           
        </section>
    </main>
    <a href="#hero" class="back-to-top" id="backToTop" aria-label="Volver al inicio">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="home-svg">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </a>
    <script src="js/main.js"></script>
</body>
</html>
